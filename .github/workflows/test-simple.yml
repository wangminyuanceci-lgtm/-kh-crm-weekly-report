name: KH CRM Weekly Report Test

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      date_start:
        description: '报告起始日 (YYYY-MM-DD)'
        required: false
        type: string
      date_end:
        description: '报告结束日 (YYYY-MM-DD)'
        required: false
        type: string
  push:
    paths:
      - .github/workflows/test-simple.yml

env:
  NODE_VERSION: '20'
  LARK_CLI_NO_PROXY: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "structure ok"
