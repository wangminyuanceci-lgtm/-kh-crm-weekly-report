name: KH CRM Weekly Report Test

on:
  workflow_dispatch:
    inputs:
      date_start:
        description: '报告起始日 (YYYY-MM-DD)'
        required: false
        type: string
      date_end:
        description: '报告结束日 (YYYY-MM-DD)'
        required: false
        type: string
  push:
    paths:
      - .github/workflows/try.yml

env:
  NODE_VERSION: '20'
  LARK_CLI_NO_PROXY: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          cd scripts
          npm install

      - name: 配置日期
        id: dates
        run: |
          if [ "${{ github.event.inputs.date_start }}" != "" ]; then
            echo "START=${{ github.event.inputs.date_start }}" >> $GITHUB_OUTPUT
            echo "END=${{ github.event.inputs.date_end }}" >> $GITHUB_OUTPUT
          else
            START=$(TZ='Asia/Shanghai' date -d 'last monday -7 days' '+%Y-%m-%d')
            END=$(TZ='Asia/Shanghai' date -d 'last monday -1 days' '+%Y-%m-%d')
            echo "START=$START" >> $GITHUB_OUTPUT
            echo "END=$END" >> $GITHUB_OUTPUT
          fi

      - name: 拉取 Klaviyo 数据
        run: |
          cd scripts
          node pull-klaviyo.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"
        env:
          KLAVIYO_PRIVATE_KEY: ${{ secrets.KLAVIYO_PRIVATE_KEY }}

      - name: 拉取 Shopify GMV
        run: |
          cd scripts
          node pull-shopify.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"
        env:
          SHOPIFY_STORE: ${{ secrets.KH_SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID: ${{ secrets.KH_SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.KH_SHOPIFY_CLIENT_SECRET }}

      - name: 拉取营销日历
        run: |
          cd scripts
          node pull-calendar.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: 上传报告产物
        uses: actions/upload-artifact@v4
        with:
          name: kh-crm-report-test
          path: scripts/*.md
          retention-days: 30
