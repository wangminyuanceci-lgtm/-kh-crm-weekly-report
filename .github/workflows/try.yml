name: KH CRM Weekly Report Test

on:
  workflow_dispatch:
    inputs:
      date_start:
        description: '报告起始日 (YYYY-MM-DD)'
        required: false
        type: string
      date_end:
        description: '报告结束日 (YYYY-MM-DD)'
        required: false
        type: string
  push:
    paths:
      - .github/workflows/try.yml

env:
  NODE_VERSION: '20'
  LARK_CLI_NO_PROXY: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          cd scripts
          npm install

      - name: 测试 step env with secrets
        run: |
          echo "Testing env with secrets"
          echo "KEY_LENGTH=${#TEST_KEY}"
        env:
          TEST_KEY: ${{ secrets.KLAVIYO_PRIVATE_KEY }}
