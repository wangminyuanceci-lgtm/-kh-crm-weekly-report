name: KH CRM Weekly Report

on:
  schedule:
    # 每周一北京时间 13:00 = 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      date_start:
        description: '报告起始日 (YYYY-MM-DD)，留空自动计算上周一'
        required: false
        type: string
      date_end:
        description: '报告结束日 (YYYY-MM-DD)，留空自动计算上周日'
        required: false
        type: string

env:
  NODE_VERSION: '20'
  LARK_CLI_NO_PROXY: '1'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: 安装依赖
        run: |
          cd scripts
          npm ci
          npm install -g @larksuite/cli

      - name: 初始化飞书 CLI
        run: |
          echo "${{ secrets.FEISHU_APP_SECRET }}" | \
            lark-cli config init \
              --app-id "${{ secrets.FEISHU_APP_ID }}" \
              --app-secret-stdin \
              --brand feishu

      - name: 配置日期
        id: dates
        run: |
          if [ "${{ github.event.inputs.date_start }}" != "" ]; then
            echo "START=${{ github.event.inputs.date_start }}" >> $GITHUB_OUTPUT
            echo "END=${{ github.event.inputs.date_end }}" >> $GITHUB_OUTPUT
          else
            START=$(TZ='Asia/Shanghai' date -d 'last monday -7 days' '+%Y-%m-%d')
            END=$(TZ='Asia/Shanghai' date -d 'last monday -1 days' '+%Y-%m-%d')
            echo "START=$START" >> $GITHUB_OUTPUT
            echo "END=$END" >> $GITHUB_OUTPUT
          fi

      - name: 拉取 Klaviyo 数据
        run: |
          cd scripts
          node pull-klaviyo.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"
        env:
          KLAVIYO_PRIVATE_KEY: ${{ secrets.KLAVIYO_PRIVATE_KEY }}

      - name: 拉取 Shopify GMV
        run: |
          cd scripts
          node pull-shopify.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"
        env:
          SHOPIFY_STORE: ${{ secrets.KH_SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.KH_SHOPIFY_ACCESS_TOKEN }}

      - name: 拉取营销日历
        run: |
          cd scripts
          node pull-calendar.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}

      - name: 生成周报
        run: |
          cd scripts
          node generate-report.mjs \
            --start "${{ steps.dates.outputs.START }}" \
            --end "${{ steps.dates.outputs.END }}"

      - name: 发布到飞书文档
        run: |
          cd scripts
          REPORT_FILE=$(ls kh-crm-weekly-*.md 2>/dev/null | head -1)
          if [ -z "$REPORT_FILE" ]; then
            echo "❌ 未找到报告文件"
            exit 1
          fi
          WEEK=$(echo "$REPORT_FILE" | sed 's/kh-crm-weekly-//' | sed 's/\.md//')

          DOC_RESULT=$(lark-cli docs +create \
            --api-version v2 \
            --content "<title>KH CRM Weekly Performance Report - ${WEEK}</title><p></p>" \
            --parent-token KezUf0UI2lR27KdfBK8c4napnUh)
          echo "$DOC_RESULT"
          DOC_ID=$(echo "$DOC_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['document']['document_id'])")
          echo "DOC_ID=$DOC_ID" >> $GITHUB_ENV

          lark-cli docs +update \
            --doc "$DOC_ID" \
            --command append \
            --content @"$REPORT_FILE" \
            --doc-format markdown \
            --api-version v2

      - name: 写入 Bitable
        run: |
          cd scripts
          if [ -f "bitable-campaign.json" ]; then
            lark-cli base +record-batch-create \
              --base-token F2pVbsy0OaaocEsQeuYcJKkHnBI \
              --table-id tblladSdv4Aj4Zgm \
              --json @bitable-campaign.json
          fi
          if [ -f "bitable-flow.json" ]; then
            lark-cli base +record-batch-create \
              --base-token F2pVbsy0OaaocEsQeuYcJKkHnBI \
              --table-id tbl2RUsiYrn7zFTq \
              --json @bitable-flow.json
          fi

      - name: 推送运营群
        run: |
          WEEK=$(python3 -c "from datetime import datetime; d=datetime.strptime('${{ steps.dates.outputs.END }}','%Y-%m-%d'); print(f'W{d.isocalendar()[1]:02d}')")
          DOC_ID="${{ env.DOC_ID }}"
          DOC_URL="https://ritfitsports.feishu.cn/docx/${DOC_ID}"

          CAMP_REV=$(python3 -c "import json; d=json.load(open('scripts/klaviyo-data.json')); print(sum(c.get('attributes',{}).get('conversion_value',0) for c in d.get('campaigns',[])))" 2>/dev/null || echo 0)
          FLOW_REV=$(python3 -c "import json; d=json.load(open('scripts/klaviyo-data.json')); print(sum(f.get('attributes',{}).get('conversion_value',0) for f in d.get('flows',[])))" 2>/dev/null || echo 0)
          TOTAL_REV=$(python3 -c "print($CAMP_REV + $FLOW_REV)" 2>/dev/null || echo 0)
          GMV=$(cat scripts/shopify-gmv.txt 2>/dev/null || echo 0)

          FMT_REV=$(python3 -c "print(f'\${float($TOTAL_REV):,.0f}')")
          FMT_CAMP=$(python3 -c "print(f'\${float($CAMP_REV):,.0f}')")
          FMT_FLOW=$(python3 -c "print(f'\${float($FLOW_REV):,.0f}')")
          FMT_GMV=$(python3 -c "print(f'\${float($GMV):,.0f}')")

          cat > /tmp/kh_msg.md << MSGEOF
        **📊 KH CRM ${WEEK} 周报已发布**
        周期：${{ steps.dates.outputs.START }} ~ ${{ steps.dates.outputs.END }}

        **📈 核心数据：**
        • EDM 总收入：**${FMT_REV}**
        • Campaign 收入：${FMT_CAMP} | Flow 收入：${FMT_FLOW}
        • Shopify GMV：${FMT_GMV}

        📎 [完整报告](${DOC_URL})
        MSGEOF

          lark-cli im +messages-send \
            --chat-id "${{ secrets.FEISHU_CHAT_ID }}" \
            --markdown @/tmp/kh_msg.md

      - name: 上传报告产物
        uses: actions/upload-artifact@v4
        with:
          name: kh-crm-report-${{ steps.dates.outputs.START }}
          path: scripts/*.md
          retention-days: 30
